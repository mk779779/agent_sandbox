services:
  postgres:
    image: postgres:16-alpine
    container_name: adk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: adk
      POSTGRES_USER: adk
      POSTGRES_PASSWORD: adk
    ports:
      - "5432:5432"
    volumes:
      - adk_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adk -d adk"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  adk_postgres_data:
