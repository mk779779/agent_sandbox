services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.110.0
    container_name: sec-kpi-otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4318:4318" # OTLP HTTP ingest
      - "4317:4317" # OTLP gRPC ingest
      - "9464:9464" # Prometheus scrape endpoint for OTel metrics
    depends_on:
      - tempo

  tempo:
    image: grafana/tempo:2.6.1
    container_name: sec-kpi-tempo
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200" # Tempo API / query endpoint

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: sec-kpi-prometheus
    command: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.path=/prometheus"]
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector

  grafana:
    image: grafana/grafana:11.2.2
    container_name: sec-kpi-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - tempo

volumes:
  tempo_data:
  prometheus_data:
  grafana_data:
